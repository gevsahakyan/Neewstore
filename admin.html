<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Newstore - Պրեմիում Ադմին</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%); 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            min-height: 100vh; 
            margin: 0;
            padding: 0;
        }
        @media (min-width: 768px) { body { padding: 2rem; } }
        
        .glass-panel { 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(24px); 
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.9); 
            border-radius: 0; 
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08); 
            min-height: 100vh;
        }
        @media (min-width: 768px) { .glass-panel { border-radius: 28px; min-height: auto; } }

        .glass-input { 
            background: rgba(248, 250, 252, 0.8); 
            border: 1px solid rgba(226, 232, 240, 0.8); 
            transition: all 0.3s ease; 
            font-size: 16px; 
        }
        .glass-input:focus { 
            background: #ffffff; 
            outline: none; 
            border-color: #6366f1; 
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15); 
        }
        
        .tab-btn { transition: all 0.3s ease; color: #64748b; font-weight: 600; }
        .tab-btn.active { 
            background: #ffffff; 
            color: #4f46e5; 
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.06); 
        }
        
        .img-preview-card {
            width: 80px; height: 80px; flex-shrink: 0; position: relative;
            border-radius: 12px; border: 2px solid #e2e8f0; overflow: hidden;
            background: white; transition: all 0.3s;
        }
        @media (min-width: 768px) { .img-preview-card { width: 100px; height: 100px; } }
        
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="text-gray-800">

    <div class="glass-panel w-full max-w-3xl mx-auto p-5 md:p-10">
        
        <div class="flex flex-col items-center mb-6 md:mb-10 text-center">
            <h1 class="text-2xl md:text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-purple-600 mb-6 tracking-tight">Ադմինիստրացիա</h1>
            
            <div class="flex w-full md:w-3/4 bg-gray-200/50 p-1.5 rounded-2xl border border-gray-200/60 shadow-inner">
                <button id="tabProductBtn" class="tab-btn active flex-1 py-3 md:py-3.5 rounded-xl text-sm md:text-base">📦 Ապրանքներ</button>
                <button id="tabSettingsBtn" class="tab-btn flex-1 py-3 md:py-3.5 rounded-xl text-sm md:text-base">⚙️ Կարգավորումներ</button>
            </div>
        </div>

        <div id="tabProduct">
            <form id="addForm" class="space-y-4 md:space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6">
                    <div class="md:col-span-2">
                        <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1.5">Ապրանքի Անվանում</label>
                        <input type="text" id="title" required placeholder="օր.՝ iPhone 15 Pro, 256GB" class="glass-input w-full p-3.5 md:p-4 rounded-xl md:rounded-2xl">
                    </div>
                    
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1.5">Գին (֏)</label>
                        <input type="number" id="price" required placeholder="500000" class="glass-input w-full p-3.5 md:p-4 rounded-xl md:rounded-2xl">
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1.5">Զեղչված Գին (֏) <span class="font-normal opacity-70">- ըստ ցանկության</span></label>
                        <input type="number" id="discountPrice" placeholder="450000" class="glass-input w-full p-3.5 md:p-4 rounded-xl md:rounded-2xl border-indigo-100">
                    </div>

                    <div class="md:col-span-2">
                        <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1.5">Կատեգորիա</label>
                        <select id="category" class="glass-input w-full p-3.5 md:p-4 rounded-xl md:rounded-2xl cursor-pointer">
                            <option value="Էլեկտրոնիկա">📱 Էլեկտրոնիկա</option>
                            <option value="Կենցաղային">🏠 Կենցաղային</option>
                            <option value="Աքսեսուարներ">⌚ Աքսեսուարներ</option>
                        </select>
                    </div>

                    <div class="md:col-span-2">
                        <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1.5">Բնութագիր</label>
                        <textarea id="description" rows="3" class="glass-input w-full p-3.5 md:p-4 rounded-xl md:rounded-2xl" placeholder="Ապրանքի կարճ նկարագրությունը..."></textarea>
                    </div>
                </div>

                <div class="bg-indigo-50/50 p-4 rounded-2xl border border-indigo-100/50">
                    <label class="block text-xs font-bold text-gray-600 uppercase tracking-wider mb-2">Ապրանքի Նկարներ</label>
                    <input type="file" id="imageInput" accept="image/*" multiple class="w-full text-sm text-slate-500 file:mr-4 file:py-2.5 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-semibold file:bg-indigo-600 file:text-white hover:file:bg-indigo-700 cursor-pointer">
                    
                    <div id="imagePreviews" class="flex gap-3 overflow-x-auto hide-scrollbar py-3 mt-2"></div>
                </div>

                <button type="submit" id="submitProductBtn" class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-bold py-4 md:py-5 rounded-xl md:rounded-2xl hover:shadow-lg hover:shadow-indigo-500/30 transition-all duration-300 transform active:scale-[0.98]">
                    Ավելացնել Բազայում
                </button>
            </form>
            <div id="productStatus" class="mt-4 text-center font-bold text-sm hidden p-4 rounded-xl"></div>
        </div>

        <div id="tabSettings" class="hidden">
            <form id="settingsForm" class="space-y-4 md:space-y-5">
                <div class="bg-indigo-50 p-4 rounded-xl md:rounded-2xl border border-indigo-100">
                    <p class="text-xs md:text-sm text-indigo-700 font-medium">Այս տվյալները կցուցադրվեն խանութի կոնտակտային կոճակներում:</p>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div><label class="block text-xs font-bold text-gray-500 mb-1.5">WhatsApp (374...)</label><input type="text" id="setWa" class="glass-input w-full p-3.5 rounded-xl"></div>
                    <div><label class="block text-xs font-bold text-gray-500 mb-1.5">Հեռախոս (+374...)</label><input type="text" id="setPhone" class="glass-input w-full p-3.5 rounded-xl"></div>
                    <div class="md:col-span-2"><label class="block text-xs font-bold text-gray-500 mb-1.5">Instagram Հղում</label><input type="url" id="setIg" class="glass-input w-full p-3.5 rounded-xl"></div>
                    <div class="md:col-span-2"><label class="block text-xs font-bold text-gray-500 mb-1.5">TikTok Հղում</label><input type="url" id="setTt" class="glass-input w-full p-3.5 rounded-xl"></div>
                    <div class="md:col-span-2"><label class="block text-xs font-bold text-gray-500 mb-1.5">Facebook Հղում</label><input type="url" id="setFb" class="glass-input w-full p-3.5 rounded-xl"></div>
                </div>
                
                <button type="submit" id="submitSettingsBtn" class="w-full bg-slate-800 text-white font-bold py-4 md:py-5 rounded-xl md:rounded-2xl hover:bg-slate-900 transition-all mt-4 transform active:scale-[0.98]">
                    Պահպանել Կարգավորումները
                </button>
            </form>
            <div id="settingsStatus" class="mt-4 text-center font-bold text-sm hidden p-4 rounded-xl"></div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, doc, setDoc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDkhXGDcXbHOjFajdmW6XUc7VW38F9I-oU",
            authDomain: "online-shop-74e3e.firebaseapp.com",
            projectId: "online-shop-74e3e",
            storageBucket: "online-shop-74e3e.firebasestorage.app",
            messagingSenderId: "110533352997",
            appId: "1:110533352997:web:a406119b43a8250abba9cc"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const IMGBB_API_KEY = "e134fd6a4cb5bc87bedee58fe7eb70c6";

        const switchTab = (tab) => {
            const isProd = tab === 'product';
            document.getElementById('tabProductBtn').classList.toggle('active', isProd);
            document.getElementById('tabSettingsBtn').classList.toggle('active', !isProd);
            document.getElementById('tabProduct').classList.toggle('hidden', !isProd);
            document.getElementById('tabSettings').classList.toggle('hidden', isProd);
            if(!isProd) loadSettings();
        };

        document.getElementById('tabProductBtn').onclick = () => switchTab('product');
        document.getElementById('tabSettingsBtn').onclick = () => switchTab('settings');

        let selectedFiles = [];
        const imageInput = document.getElementById('imageInput');
        const previewsContainer = document.getElementById('imagePreviews');

        imageInput.addEventListener('change', (e) => {
            Array.from(e.target.files).forEach(file => {
                selectedFiles.push({ file: file, previewUrl: URL.createObjectURL(file) });
            });
            renderPreviews();
            imageInput.value = '';
        });

        const renderPreviews = () => {
            previewsContainer.innerHTML = '';
            selectedFiles.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = "img-preview-card group";
                card.innerHTML = `
                    <img src="${item.previewUrl}" class="w-full h-full object-cover">
                    <div class="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 flex flex-col items-center justify-center gap-1 transition-opacity">
                        <button type="button" onclick="window.delImg(${index})" class="bg-red-500 text-white px-3 py-1 rounded-md text-[10px] font-bold">Ջնջել</button>
                    </div>
                `;
                previewsContainer.appendChild(card);
            });
        };

        window.delImg = (index) => { selectedFiles.splice(index, 1); renderPreviews(); };

        document.getElementById('addForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitProductBtn');
            const status = document.getElementById('productStatus');

            if(selectedFiles.length === 0) { alert("Ավելացրեք նկար"); return; }

            btn.disabled = true;
            status.className = "mt-4 text-center font-bold text-sm p-4 rounded-xl bg-blue-50 text-blue-600 block";
            
            try {
                let uploadedUrls = [];
                for (let i = 0; i < selectedFiles.length; i++) {
                    status.innerText = `Բեռնվում է նկար ${i+1}/${selectedFiles.length}...`;
                    const fd = new FormData(); fd.append("image", selectedFiles[i].file);
                    const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: "POST", body: fd });
                    const data = await res.json();
                    uploadedUrls.push(data.data.url);
                }

                status.innerText = "Պահպանվում է բազայում...";
                await addDoc(collection(db, "products"), {
                    title: document.getElementById('title').value.trim(),
                    price: Number(document.getElementById('price').value),
                    discountPrice: Number(document.getElementById('discountPrice').value) || 0,
                    category: document.getElementById('category').value,
                    description: document.getElementById('description').value.trim(), // ԱՎԵԼԱՑՎԱԾ Է ԲՆՈՒԹԱԳԻՐԸ
                    images: uploadedUrls,
                    imageUrl: uploadedUrls[0],
                    createdAt: serverTimestamp()
                });

                status.className = "mt-4 text-center font-bold text-sm p-4 rounded-xl bg-green-50 text-green-600 block";
                status.innerText = "✨ Ապրանքը հաջողությամբ ավելացվեց!";
                document.getElementById('addForm').reset();
                selectedFiles = []; renderPreviews();
                setTimeout(() => status.classList.add('hidden'), 4000);
            } catch (err) {
                status.className = "mt-4 text-center font-bold text-sm p-4 rounded-xl bg-red-50 text-red-600 block";
                status.innerText = "Սխալ առաջացավ, փորձեք կրկին:";
            } finally { btn.disabled = false; }
        });

        const setRef = doc(db, "settings", "global");
        async function loadSettings() {
            const snap = await getDoc(setRef);
            if(snap.exists()) {
                const d = snap.data();
                document.getElementById('setWa').value = d.whatsapp || "";
                document.getElementById('setPhone').value = d.phone || "";
                document.getElementById('setIg').value = d.instagram || "";
                document.getElementById('setTt').value = d.tiktok || "";
                document.getElementById('setFb').value = d.facebook || "";
            }
        }

        document.getElementById('settingsForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitSettingsBtn');
            const status = document.getElementById('settingsStatus');
            btn.disabled = true;

            try {
                await setDoc(setRef, {
                    whatsapp: document.getElementById('setWa').value.trim(),
                    phone: document.getElementById('setPhone').value.trim(),
                    instagram: document.getElementById('setIg').value.trim(),
                    tiktok: document.getElementById('setTt').value.trim(),
                    facebook: document.getElementById('setFb').value.trim(),
                    updatedAt: serverTimestamp()
                }, { merge: true });
                status.className = "mt-4 text-center font-bold text-sm p-4 rounded-xl bg-green-50 text-green-600 block";
                status.innerText = "✅ Պահպանվեց:";
            } catch (err) {
                status.className = "mt-4 text-center font-bold text-sm p-4 rounded-xl bg-red-50 text-red-600 block";
                status.innerText = "Սխալ:";
            } finally {
                btn.disabled = false;
                setTimeout(() => status.classList.add('hidden'), 3000);
            }
        });
    </script>
</body>
</html>
